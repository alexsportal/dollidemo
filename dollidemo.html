<script>
function applyColorFilter(value) {
  if (!activeColorCategory || ["nose", "bg", "jewelry", "skin"].includes(activeColorCategory)) return;
  let activeImg = null;

  if (activeColorCategory === "hairs") {
    const shape = document.getElementById(currentHairId);
    activeImg = shape?.querySelector("img[style*='display: block'], img[style*='display:block']");
    
  } else if (activeColorCategory === "brows") {
    const shape = document.getElementById(currentBrowId);
    activeImg = shape?.querySelector("img[style*='display: block'], img[style*='display:block']");
  }
   else if (activeColorCategory === "tops") {
    const shape = document.getElementById(currentTopId);
    activeImg = shape?.querySelector("img[style*='display: block'], img[style*='display:block']");
    currentTopHue = parseInt(value);
}  else if (activeColorCategory === "lips") {
    const shape = document.getElementById(currentLipId);
    activeImg = shape?.querySelector("img[style*='display: block'], img[style*='display:block']");
    currentLipHue = parseInt(value);
}

  if (!activeImg) return;
  activeImg.style.filter = `hue-rotate(${value}deg) saturate(2)`;
}




function applyOpacityFilter(value) {
  if (activeColorCategory !== "blush") return;
  const activeImg = document.getElementById(currentBlushId)
    ?.querySelector("img[style*='display: block'], img[style*='display:block']");
  if (!activeImg) return;
  activeImg.style.opacity = value;
}

</script>
<script>
let currentSong = null;

function playSong(songId, el) {
  const song = document.getElementById(songId);
  

  if (currentSong === song) {
    song.pause();
    song.currentTime = 0;
    currentSong = null;
    document.querySelectorAll(".menusongs").forEach(s => s.classList.remove("active"));
    return;
  }


  if (currentSong) {
    currentSong.pause();
    currentSong.currentTime = 0;
  }

  currentSong = song;
  song.play();
  document.querySelectorAll(".menusongs").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
}

function toggleMute(el) {
  if (!currentSong) return;
  currentSong.muted = !currentSong.muted;
  el.classList.toggle("muted", currentSong.muted);
}
</script>


</body>
</html>
